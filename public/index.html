<!DOCTYPE html>
<html lang="ru" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Dashboard</title>
    <meta name="theme-color" content="#10b981">
    <meta name="mobile-web-app-capable" content="yes">
    <link rel="manifest" href="/manifest.json">
    <link rel="apple-touch-icon" href="/icon-192.png">
    <link rel="stylesheet" href="./src/styles/main.css" type="text/css">
    <link rel="stylesheet" href="./src/styles/variables.css">
    <link rel="stylesheet" href="./src/modules/tasks/tasks.css" type="text/css">
    <link rel="stylesheet" href="./src/modules/notes/notes.css" type="text/css">
    <link rel="stylesheet" href="./src/modules/tracker/tracker.css" type="text/css">
    
    <style>
        /* 🎨 Новая цветовая схема */
        :root {
            --primary: #10b981;
            --primary-dark: #059669;
            --secondary: #14b8a6;
            --accent: #f59e0b;
            --danger: #f97316;
            --success: #22c55e;
            --bg-page: #f0fdfa;
            --bg-card: #ffffff;
            --bg-input: #f8fafc;
            --text-primary: #0f172a;
            --text-secondary: #475569;
            --border: #cbd5e1;
            --shadow: 0 20px 40px rgba(16, 185, 129, 0.15);
            --shadow-sm: 0 4px 12px rgba(16, 185, 129, 0.1);
            --radius: 16px;
            --radius-sm: 10px;
        }
        
        [data-theme="dark"] {
            --primary: #34d399;
            --primary-dark: #10b981;
            --secondary: #5eead4;
            --accent: #fbbf24;
            --danger: #fb923c;
            --success: #4ade80;
            --bg-page: #0f172a;
            --bg-card: #1e293b;
            --bg-input: #334155;
            --text-primary: #f1f5f9;
            --text-secondary: #94a3b8;
            --border: #475569;
            --shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
            --shadow-sm: 0 4px 12px rgba(0, 0, 0, 0.3);
        }
        
        /* 🎨 Применение цветов */
        body {
            background: var(--bg-page);
            color: var(--text-primary);
            transition: background 0.3s, color 0.3s;
        }
        
        .header {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            box-shadow: var(--shadow-sm);
        }
        
        .nav-btn {
            background: var(--bg-card);
            color: var(--text-primary);
            border: 2px solid var(--border);
            border-radius: var(--radius-sm);
            transition: all 0.2s;
        }
        
        .nav-btn.active, .nav-btn:hover {
            background: var(--primary);
            color: white;
            border-color: var(--primary-dark);
            box-shadow: var(--shadow-sm);
        }
        
        .logout-btn {
            background: var(--danger);
            color: white;
            border: none;
            border-radius: 10px;
            transition: background 0.2s;
        }
        
        .logout-btn:hover {
            background: #ea580c;
        }
        
        .user-display {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            border-radius: 12px;
            font-weight: 500;
        }
        
        .points-display {
            background: var(--bg-card);
            border: 2px solid var(--primary);
            color: var(--primary-dark);
            border-radius: 10px;
            font-weight: 600;
        }
        
        /* Auth форма */
        #auth-root {
            background: var(--bg-page);
        }
        
        #auth-root > div {
            background: var(--bg-card);
            box-shadow: var(--shadow);
            border-radius: var(--radius);
            border: 1px solid var(--border);
        }
        
        .tab-btn {
            background: var(--bg-card);
            border-color: var(--border);
            color: var(--text-primary);
        }
        
        .tab-btn.active {
            background: var(--primary);
            color: white;
            border-color: var(--primary-dark);
        }
        
        #auth-email, #auth-password {
            background: var(--bg-input);
            border-color: var(--border);
            color: var(--text-primary);
        }
        
        #auth-email:focus, #auth-password:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(16, 185, 129, 0.2);
            outline: none;
        }
        
        #auth-submit {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            border: none;
            border-radius: 10px;
            font-weight: 600;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        
        #auth-submit:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: var(--shadow-sm);
        }
        
        #auth-submit:disabled {
            opacity: 0.7;
            cursor: not-allowed;
        }
        
        #auth-message {
            background: var(--bg-input);
            border-left: 4px solid var(--primary);
        }
        
        /* Навигация */
        .navigation {
            background: var(--bg-card);
            border-bottom: 1px solid var(--border);
            padding: 0.75rem;
        }
        
        /* Футер */
        .footer {
            background: var(--bg-card);
            color: var(--text-secondary);
            border-top: 1px solid var(--border);
        }
        
        /* Переключатель темы */
        .theme-toggle {
            --toggle-size: 24px;
            display: inline-block;
            position: relative;
            width: calc(var(--toggle-size) * 2);
            height: var(--toggle-size);
        }
        
        .theme-toggle input {
            opacity: 0;
            width: 0;
            height: 0;
        }
        
        .slider {
            position: absolute;
            cursor: pointer;
            top: 0; left: 0;
            right: 0; bottom: 0;
            background: var(--border);
            border-radius: var(--toggle-size);
            transition: 0.3s;
        }
        
        .slider:before {
            position: absolute;
            content: "☀️";
            height: calc(var(--toggle-size) - 4px);
            width: calc(var(--toggle-size) - 4px);
            left: 2px;
            bottom: 2px;
            background: white;
            border-radius: 50%;
            transition: 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
        }
        
        input:checked + .slider {
            background: var(--primary);
        }
        
        input:checked + .slider:before {
            transform: translateX(calc(var(--toggle-size) - 2px));
            content: "🌙";
        }
    </style>
</head>

<body>
    <div id="app-container">
        <!-- Header -->
        <header class="header">
            <div class="header-content">
                <h1>🎯 Smart Dashboard</h1>
                <div class="user-profile" id="user-profile">
                    <span id="user-display" class="user-display" style="padding:0.75rem 1rem;border-radius:12px;font-weight:500;font-size:0.95rem;">Гость</span>
                    <button onclick="logout()" class="logout-btn" style="padding:0.5rem 1rem;font-size:0.9rem;cursor:pointer;">Выход</button>
                    <label class="theme-toggle">
                        <input type="checkbox" id="themeSwitch">
                        <span class="slider"></span>
                    </label>
                    <div class="points-display" style="padding:0.5rem 0.75rem;margin-left:0.5rem;">
                        <span class="points-label">баллов</span>
                        <span id="total-points" class="points-value" style="margin-left:0.25rem;">0</span>
                    </div>
                </div>
            </div>
        </header>

        <!-- Navigation -->
        <nav class="navigation">
            <button data-route="tasks" class="nav-btn active">
                <span class="nav-icon">✅</span> Задачи
            </button>
            <button data-route="notes" class="nav-btn">
                <span class="nav-icon">🗒️</span> Заметки  
            </button>
            <button data-route="tracker" class="nav-btn">
                <span class="nav-icon">🚀</span> Прогресс
            </button>
        </nav>

        <!-- Main Content -->
        <main id="main-container">
            <div id="auth-root" style="min-height:100vh;display:flex;align-items:center;justify-content:center;padding:2rem;">
                <div style="max-width:400px;width:100%;padding:3rem 2rem;border-radius:16px;text-align:center;">
                    <h1 style="font-size:2.5rem;margin-bottom:1rem;color:var(--primary);">🎯 Smart Dashboard</h1>
                    <p style="margin-bottom:2rem;color:var(--text-secondary);">Вход / Регистрация</p>
                    
                    <div style="display:flex;gap:1rem;margin-bottom:2rem;">
                        <button id="tab-login" class="tab-btn active" style="flex:1;padding:1rem;border:2px solid var(--border);border-radius:10px;cursor:pointer;font-weight:500;transition:all 0.2s;">Вход</button>
                        <button id="tab-register" class="tab-btn" style="flex:1;padding:1rem;border:2px solid var(--border);border-radius:10px;cursor:pointer;font-weight:500;transition:all 0.2s;">Регистрация</button>
                    </div>
                    
                    <form id="auth-form" style="display:flex;flex-direction:column;gap:1.5rem;">
                        <div style="text-align:left;">
                            <label style="display:block;margin-bottom:0.5rem;font-weight:500;color:var(--text-primary);">Email</label>
                            <input id="auth-email" type="email" placeholder="demo@gmail.com" required style="width:100%;padding:1rem;border:2px solid var(--border);border-radius:10px;font-size:1rem;box-sizing:border-box;">
                        </div>
                        <div style="text-align:left;">
                            <label style="display:block;margin-bottom:0.5rem;font-weight:500;color:var(--text-primary);">Пароль</label>
                            <input id="auth-password" type="password" minlength="6" placeholder="******" required style="width:100%;padding:1rem;border:2px solid var(--border);border-radius:10px;font-size:1rem;box-sizing:border-box;">
                        </div>
                        <button type="submit" id="auth-submit" style="width:100%;padding:1rem;font-size:1.1rem;font-weight:600;cursor:pointer;">Войти</button>
                    </form>
                    
                    <div id="auth-message" style="margin-top:1.5rem;padding:1rem;border-radius:10px;font-weight:500;"></div>
                </div>
            </div>
        </main>

        <!-- Footer -->
        <footer class="footer" style="padding:1rem;text-align:center;font-size:0.9rem;">
            <p>© 2026 Smart Dashboard PWA | Работает оффлайн 🟢</p>
        </footer>
    </div>

    <!-- ⚠️ СКРИПТЫ АВТОРИЗАЦИИ, КЕШИРОВАНИЯ И PWA — НЕ ИЗМЕНЕНЫ -->
    
    <script src="/src/core/router.js"></script>
    <script src="/src/core/dataService.js"></script>
    <script src="/src/core/notifications.js"></script>
    <script src="/src/core/cacheService.js"></script>
    <script src="/src/core/uiContainer.js"></script>
    <script src="/src/modules/tasks/tasks.js"></script>
    <script src="/src/modules/tasks/taskUI.js"></script>
    <script src="/src/modules/notes/notes.js"></script>
    <script src="/src/modules/notes/notesUI.js"></script>
    <script src="/src/modules/tracker/tracker.js"></script>
    <script src="/src/modules/tracker/trackerUI.js"></script>
    
    <script>
        // Проверяем сохранённый session
        const savedUser = sessionStorage.getItem('authUser');
        if (savedUser) {
          window.currentUser = JSON.parse(savedUser);
          const userDisplay = document.getElementById('user-display');
          if (userDisplay && window.currentUser.email !== 'Гость') {
            userDisplay.textContent = window.currentUser.email;
            userDisplay.style.background = 'linear-gradient(135deg, var(--primary), var(--secondary))';
            userDisplay.style.color = 'white';
            
            // Запускаем dashboard БЕЗ auth экрана
            document.getElementById('auth-root').style.display = 'none';
            setTimeout(async () => {
              await window.Core.init();
              window.Router.init();
              await window.Core.loadModule('tasks');
            }, 500);
          }
        }
        const form = document.getElementById('auth-form');
        const tabs = document.querySelectorAll('.tab-btn');
        const message = document.getElementById('auth-message');
        const submitBtn = document.getElementById('auth-submit');
        let mode = 'login';

        tabs[0].onclick = () => { 
          mode = 'login'; 
          tabs[0].classList.add('active'); 
          tabs[1].classList.remove('active'); 
          submitBtn.textContent = 'Войти'; 
        };
        tabs[1].onclick = () => { 
          mode = 'register'; 
          tabs[1].classList.add('active'); 
          tabs[0].classList.remove('active'); 
          submitBtn.textContent = 'Зарегистрироваться'; 
        };

        form.onsubmit = async (e) => {
          e.preventDefault();
          message.textContent = '⏳ Загрузка...';
          submitBtn.disabled = true;

          try {
            const email = document.getElementById('auth-email').value;
            const password = document.getElementById('auth-password').value;
            
            const url = mode === 'register' ? '/api/register' : '/api/login';
            const res = await fetch(url, {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ email, password }),
            });

            if (!res.ok) {
              const text = await res.text();
              throw new Error(`HTTP ${res.status} ${res.statusText}: ${text}`);
            }

            const data = await res.json();
            
            message.innerHTML = mode === 'register' 
              ? '✅ Регистрация OK. Проверь почту.' 
              : '✅ Вход выполнен!';
            
            setTimeout(async () => {
              // ✅ Сохраняем пользователя ГЛОБАЛЬНО
              window.currentUser = { email };
              // Сохраняем в sessionStorage (работает в PWA)
              sessionStorage.setItem('authUser', JSON.stringify({email}));
              sessionStorage.setItem('authSession', JSON.stringify(data.session || {}));
              
              // ✅ Обновляем имя в nav
              const userDisplay = document.getElementById('user-display');
              userDisplay.textContent = email;
              userDisplay.style.background = 'linear-gradient(135deg, var(--primary), var(--secondary))';
              userDisplay.style.color = 'white';
              
              // Скрываем auth
              document.getElementById('auth-root').remove();
              
              // Запускаем dashboard
              await window.Core.init();
              window.Router.init();
              await window.Core.loadModule('tasks');
            }, 1500);
            
          } catch (err) {
            message.textContent = err.message.includes('not confirmed') 
              ? '📧 Подтверди email' 
              : `❌ ${err.message}`;
          } finally {
            submitBtn.disabled = false;
          }
        };
        window.logout = function() {
          sessionStorage.removeItem('authUser');
          sessionStorage.removeItem('authSession');
          window.currentUser = null;
          document.getElementById('main-container').innerHTML = `
            <div style="text-align:center;padding:3rem;">
              <h2 style="color:var(--primary);">👋 До свидания!</h2>
              <button onclick="location.reload()" style="padding:1rem 2rem;background:var(--primary);color:white;border:none;border-radius:10px;font-weight:500;cursor:pointer;margin-top:1rem;">Войти снова</button>
            </div>
          `;
        };
    </script>

    <script>
        async function init() {
          console.log('🚀 MVP Dashboard с auth');
          const container = document.getElementById('main-container');
        }
        init();
    </script>
    
    <script>
        if ('serviceWorker' in navigator) {
          navigator.serviceWorker.register('/sw.js')
            .then(reg => console.log('✅ SW registered'))
            .catch(err => console.log('❌ SW failed:', err));
        }
    </script>
    
    <script>
        const themeSwitch = document.getElementById('themeSwitch');
        if (themeSwitch) {
          const html = document.documentElement;
          const savedTheme = localStorage.getItem('theme') || (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
          html.setAttribute('data-theme', savedTheme);
          themeSwitch.checked = savedTheme === 'dark';
          themeSwitch.onchange = () => {
            const theme = themeSwitch.checked ? 'dark' : 'light';
            html.setAttribute('data-theme', theme);
            localStorage.setItem('theme', theme);
          };
        }
    </script>
</body>
</html>
